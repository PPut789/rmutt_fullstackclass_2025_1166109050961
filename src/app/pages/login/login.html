<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">
        <i class="fas fa-cube"></i>
      </div>
      <h2>Welcome to InvenTrack</h2>
      <p>Please sign in to your account</p>
    </div>

    @if (errorMessage) {
      <div style="color: #ef4444; background: #fef2f2; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; text-align: center;">
        {{ errorMessage }}
      </div>
    }

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Enter your password" required>
      </div>

      

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
