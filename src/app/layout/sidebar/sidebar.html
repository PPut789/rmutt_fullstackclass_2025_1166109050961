<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">
      <i class="fas fa-cube"></i>
    </div>
    <span class="logo-text">สรุปเว็ปนี้ชื่อไร</span>
  </div>

  <ul>
    <li routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
    </li>
    <li routerLink="/products" routerLinkActive="active">
      <i class="fas fa-box"></i> <span>Products</span>
    </li>
    <li routerLink="/categories" routerLinkActive="active">
      <i class="fas fa-tags"></i> <span>Categories</span>
    </li>
    <li routerLink="/suppliers" routerLinkActive="active">  
      <i class="fas fa-truck"></i> <span>Suppliers</span>
    </li>
    <li routerLink="/warehouses" routerLinkActive="active">
      <i class="fas fa-warehouse"></i> <span>Warehouses</span>
    </li>
    <li routerLink="/stock" routerLinkActive="active">
      <i class="fas fa-cubes"></i> <span>Stock Levels</span>
    </li>
    <li routerLink="/orders" routerLinkActive="active">
      <i class="fas fa-shopping-cart"></i> <span>Orders</span>
    </li>
    <li routerLink="/shipments" routerLinkActive="active">
      <i class="fas fa-shipping-fast"></i> <span>Shipments</span>
    </li>
  </ul>
</div>
